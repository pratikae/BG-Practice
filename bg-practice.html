<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProTify Shuffle · BG Practice</title>
    <meta
      name="description"
      content="Practice Bhagavad Gita shlokas by playing odd or even verses with the exact pause length of the skipped verse in between."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-badge">Bhagavad Gita Practice</div>
        <h1>ProTify Shuffle · BG Practice</h1>
        <p>
          Play only odd or even shlokas with the correct pause length of the skipped verse in between.
        </p>
        <div class="hero-actions">
          <a class="ghost-link" href="https://www.protify-shuffle.com" target="_blank" rel="noopener">
            Open ProTify Shuffle
          </a>
        </div>
      </header>

      <main class="app-card">
        <section class="controls">
          <div class="field">
            <label for="chapterSelect">Chapter</label>
            <select id="chapterSelect"></select>
          </div>

          <div class="field">
            <label for="modeSelect">Playback mode</label>
            <select id="modeSelect">
              <option value="odd">Odd verses only</option>
              <option value="even">Even verses only</option>
              <option value="all">All verses</option>
            </select>
          </div>

          <div class="button-row">
            <button id="playBtn">Play</button>
            <button id="pauseBtn" class="secondary">Pause</button>
            <button id="stopBtn" class="secondary">Stop</button>
          </div>
        </section>

        <section class="status-panel">
          <h2 id="chapterTitle">Loading chapter...</h2>
          <p id="statusText">Choose a chapter and press play.</p>
          <div class="progress-row">
            <span id="currentVerseLabel">No verse playing</span>
            <span id="queueLabel"></span>
          </div>
          <div class="timeline">
            <div id="timelineFill"></div>
          </div>
        </section>

        <section class="playlist" id="playlist"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
